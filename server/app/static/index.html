<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Context Creator</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #222; }
  h1 { font-weight: 600; }
  input, button { font-size: 1rem; padding: 8px; margin: 4px 0; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .hidden { display: none; }
  .muted { color: #666; }
  code { background: #f2f2f2; padding: 2px 6px; border-radius: 4px; word-break: break-all; }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 16px 0; }
</style>
</head>
<body>
  <h1>Context Creator</h1>

  <div id="setup" class="card hidden">
    <h2>Create your admin account</h2>
    <div><input id="setup-username" placeholder="username" autocomplete="username"></div>
    <div><input id="setup-password" type="password" placeholder="password" autocomplete="new-password"></div>
    <button id="setup-btn">Create account</button>
    <p id="setup-error" class="muted"></p>
  </div>

  <div id="login" class="card hidden">
    <h2>Log in</h2>
    <div><input id="username" placeholder="username" autocomplete="username"></div>
    <div><input id="password" type="password" placeholder="password" autocomplete="current-password"></div>
    <button id="login-btn">Log in</button>
    <p id="login-error" class="muted"></p>
  </div>

  <div id="dash" class="card hidden">
    <p>Logged in as <strong id="who"></strong> <button id="logout-btn">Log out</button></p>

    <!-- book list -->
    <div id="books-view">
      <h2>Books</h2>
      <ul id="books"></ul>
      <p id="books-empty" class="muted hidden">No books synced yet.</p>
      <p class="muted">To sync from KOReader, open Context Creator &rarr; Sync and log in with this
      server's address plus your account username and password.</p>
    </div>

    <!-- one book's contexts -->
    <div id="book-view" class="hidden">
      <p><a href="#" id="back-books">&larr; Books</a></p>
      <h2 id="book-title"></h2>
      <div class="row">
        <input id="new-context-title" placeholder="new context name">
        <select id="new-context-type">
          <option value="unset">No type</option>
          <option value="character">Character</option>
          <option value="place">Location</option>
          <option value="object">Object</option>
          <option value="concept">Concept</option>
        </select>
        <button id="add-context-btn">Add context</button>
      </div>
      <div id="contexts"></div>
    </div>
  </div>

<script>
async function api(path, opts) {
  const res = await fetch(path, Object.assign({ headers: { "Content-Type": "application/json" } }, opts));
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || res.statusText);
  return res.json();
}
const $ = (id) => document.getElementById(id);
const show = (id, on) => $(id).classList.toggle("hidden", !on);
const esc = (s) => (s || "").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const TYPE_LABELS = { character: "Character", place: "Location", object: "Object", concept: "Concept" };

let currentBook = null;

async function refresh() {
  const setup = await api("/api/setup").catch(() => ({ needs_setup: false }));
  if (setup.needs_setup) {
    show("setup", true); show("login", false); show("dash", false);
    return;
  }
  show("setup", false);
  try {
    const me = await api("/api/me");
    $("who").textContent = me.username;
    show("login", false); show("dash", true);
    showBooksList();
  } catch (e) {
    show("dash", false); show("login", true);
  }
}

async function showBooksList() {
  currentBook = null;
  show("books-view", true); show("book-view", false);
  const books = await api("/api/books");
  $("books").innerHTML = books.map(b =>
    `<li><a href="#" data-book="${esc(b.book_id)}">${esc(b.title || b.book_id)}</a> <span class="muted">${esc(b.authors || "")}</span></li>`
  ).join("");
  show("books-empty", books.length === 0);
  $("books").querySelectorAll("a[data-book]").forEach(a =>
    a.onclick = (e) => { e.preventDefault(); openBook(a.dataset.book); });
}

async function openBook(book_id) {
  currentBook = book_id;
  const doc = await api("/api/books/" + encodeURIComponent(book_id));
  show("books-view", false); show("book-view", true);
  $("book-title").textContent = (doc.book && doc.book.title) || book_id;
  renderContexts(doc);
}

function renderContexts(doc) {
  const contexts = doc.contexts || {};
  const keys = Object.keys(contexts).sort((a, b) =>
    (contexts[a].title || a).toLowerCase().localeCompare((contexts[b].title || b).toLowerCase()));
  if (keys.length === 0) { $("contexts").innerHTML = `<p class="muted">No contexts yet.</p>`; return; }
  $("contexts").innerHTML = keys.map(k => {
    const c = contexts[k];
    const label = TYPE_LABELS[c.type] || (c.type && c.type !== "unset" ? c.type : "");
    const pts = (c.points || []).map(p => `<li>${esc(typeof p === "string" ? p : p.text)}</li>`).join("");
    return `<div class="card">
      <strong>${esc(c.title || k)}</strong> <span class="muted">${esc(label)}</span>
      <ul>${pts || '<li class="muted">no dot points</li>'}</ul>
      <div class="row">
        <input placeholder="add a dot point" data-point="${esc(k)}">
        <button data-addpoint="${esc(k)}">Add</button>
      </div>
    </div>`;
  }).join("");
  $("contexts").querySelectorAll("button[data-addpoint]").forEach(btn =>
    btn.onclick = () => addPoint(btn.dataset.addpoint));
}

async function addPoint(key) {
  const input = $("contexts").querySelector(`input[data-point="${CSS.escape(key)}"]`);
  const text = input && input.value.trim();
  if (!text) return;
  await api(`/api/books/${encodeURIComponent(currentBook)}/contexts/${encodeURIComponent(key)}/points`,
    { method: "POST", body: JSON.stringify({ text }) });
  await openBook(currentBook);
}

$("setup-btn").onclick = async () => {
  $("setup-error").textContent = "";
  try {
    await api("/api/setup", { method: "POST", body: JSON.stringify({ username: $("setup-username").value, password: $("setup-password").value }) });
    await refresh();
  } catch (e) { $("setup-error").textContent = e.message; }
};

$("login-btn").onclick = async () => {
  $("login-error").textContent = "";
  try {
    await api("/api/auth/login", { method: "POST", body: JSON.stringify({ username: $("username").value, password: $("password").value }) });
    await refresh();
  } catch (e) { $("login-error").textContent = e.message; }
};
$("logout-btn").onclick = async () => { await api("/api/auth/logout", { method: "POST" }); await refresh(); };
$("back-books").onclick = (e) => { e.preventDefault(); showBooksList(); };
$("add-context-btn").onclick = async () => {
  const title = $("new-context-title").value.trim();
  if (!title || !currentBook) return;
  await api(`/api/books/${encodeURIComponent(currentBook)}/contexts`,
    { method: "POST", body: JSON.stringify({ title, type: $("new-context-type").value }) });
  $("new-context-title").value = "";
  await openBook(currentBook);
};
refresh();
</script>
</body>
</html>
